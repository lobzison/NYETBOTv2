# NYETBOTv2 tunable configuration.
#
# Only NON-SECRET tunables live here. Secrets are read from the environment:
#   NYETBOT_KEY, DATABASE_URL, OLLAMA_DOMAIN (+ optional LLM_MESSAGE_EVERY override).
#
# Operators can override the whole file at deploy time with:
#   -Dconfig.file=/etc/nyetbot/application.conf
nyetbot {
  llm {
    bot-name     = "NYETBOT"
    bot-alias    = "@nyetterbot"
    user-prefix  = ""
    input-prefix = ": "

    # Random reply roughly 1 in N messages (env LLM_MESSAGE_EVERY overrides this).
    message-every = 150

    chat-buffer-size     = 200   # rolling chat buffer cap
    reply-context-window = 20    # recent chat lines fed into the reply prompt
    recent-user-messages = 50    # per-user window summarised on each reply

    profile-max-chars = 300      # hard cap on a persisted user profile
    summary-max-chars = 500      # hard cap on a fresh per-user summary

    reply {
      min-chars   = 200          # soft lower bound for a reply (directive, not hard truncation)
      mean-factor = 1.5          # target length ~= mean-factor * last message length
      spread      = 0.3          # +/- jitter fraction around the target
      max-chars   = 900          # clamp for the target length
    }
  }

  ollama {
    port          = 11434
    reply-model   = "NYETBOTv1"   # schizo persona model (temp 1.0)
    utility-model = "gemma4:e4b"  # neutral base model for summarise/classify/rewrite (low temp)

    reply-temperature   = 1.0
    utility-temperature = 0.2

    reply-num-predict   = 512
    summary-num-predict = 256
    rewrite-num-predict = 200
    intent-num-predict  = 4

    num-ctx = 8192
    think   = false

    request-timeout-minutes = 25
    idle-timeout-minutes    = 25
  }
}
